name: 04 - Deploy Docker Image to ECS

on:
  workflow_dispatch:
    inputs:
      ecs_cluster:
        description: 'ECS Cluster Name'
        required: true
      image_tag:
        description: 'Docker Image Tag'
        required: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Create ECS Task Execution Role
        run: |
          # Check if role exists
          ROLE_NAME="ecsTaskExecutionRole"
          ROLE_EXISTS=$(aws iam get-role --role-name $ROLE_NAME 2>/dev/null || echo "false")
          
          if [ "$ROLE_EXISTS" = "false" ]; then
            echo "Creating ECS Task Execution Role..."
            
            # Create the role
            aws iam create-role \
              --role-name $ROLE_NAME \
              --assume-role-policy-document '{
                "Version": "2012-10-17",
                "Statement": [
                  {
                    "Effect": "Allow",
                    "Principal": {
                      "Service": "ecs-tasks.amazonaws.com"
                    },
                    "Action": "sts:AssumeRole"
                  }
                ]
              }'
            
            # Attach the required policy
            aws iam attach-role-policy \
              --role-name $ROLE_NAME \
              --policy-arn arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy
            
            echo "ECS Task Execution Role created successfully"
          else
            echo "ECS Task Execution Role already exists"
          fi
          
          # Get the role ARN
          ROLE_ARN=$(aws iam get-role --role-name $ROLE_NAME --query 'Role.Arn' --output text)
          echo "ROLE_ARN=$ROLE_ARN" >> $GITHUB_ENV

      - name: Register ECS Task Definition
        id: task-def
        run: |
          cat > task-def.json <<EOF
          {
            "family": "react-app-task",
            "networkMode": "awsvpc",
            "requiresCompatibilities": ["FARGATE"],
            "cpu": "256",
            "memory": "512",
            "executionRoleArn": "${{ env.ROLE_ARN }}",
            "containerDefinitions": [
              {
                "name": "react-app",
                "image": "${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/react-app:${{ github.event.inputs.image_tag }}",
                "essential": true,
                "portMappings": [
                  {
                    "containerPort": 80,
                    "protocol": "tcp"
                  }
                ],
                "logConfiguration": {
                  "logDriver": "awslogs",
                  "options": {
                    "awslogs-group": "/ecs/react-app",
                    "awslogs-region": "${{ secrets.AWS_REGION }}",
                    "awslogs-stream-prefix": "ecs"
                  }
                }
              }
            ]
          }
          EOF
          aws ecs register-task-definition --cli-input-json file://task-def.json

      - name: Create CloudWatch Log Group
        run: |
          aws logs create-log-group --log-group-name /ecs/react-app || true

      - name: Create ECS Service (if not exists)
        id: create-service
        run: |
          SERVICE_NAME=react-app-service
          CLUSTER=${{ github.event.inputs.ecs_cluster }}
          TASK_DEF_ARN=$(aws ecs describe-task-definition --task-definition react-app-task --query 'taskDefinition.taskDefinitionArn' --output text)
          SERVICE_EXISTS=$(aws ecs describe-services --cluster $CLUSTER --services $SERVICE_NAME --query 'services[0].status' --output text 2>/dev/null || echo "MISSING")
          if [ "$SERVICE_EXISTS" = "ACTIVE" ]; then
            echo "Service exists, updating..."
            aws ecs update-service --cluster $CLUSTER --service $SERVICE_NAME --task-definition $TASK_DEF_ARN
          else
            echo "Creating new service..."
            aws ecs create-service \
              --cluster $CLUSTER \
              --service-name $SERVICE_NAME \
              --task-definition $TASK_DEF_ARN \
              --desired-count 1 \
              --launch-type FARGATE \
              --network-configuration "awsvpcConfiguration={subnets=[${{ secrets.SUBNET_ID }}],securityGroups=[${{ secrets.SECURITY_GROUP_ID }}],assignPublicIp=ENABLED}" \
              --load-balancers "[{\"targetGroupArn\":\"${{ secrets.TARGET_GROUP_ARN }}\",\"containerName\":\"react-app\",\"containerPort\":80}]" \
              --deployment-configuration maximumPercent=200,minimumHealthyPercent=100
          fi

      - name: Wait for service to stabilize
        run: |
          aws ecs wait services-stable --cluster ${{ github.event.inputs.ecs_cluster }} --services react-app-service 